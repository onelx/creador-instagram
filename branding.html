<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Branding</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d14;
      --surface: #16161f;
      --surface2: #1e1e2a;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f5;
      --muted: rgba(255,255,255,0.45);
      --accent: #7c6af7;
      --accent2: #f7776a;
      --accent3: #5edab8;
      --radius: 16px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 48px;
    }
    .header .badge {
      display: inline-block;
      background: rgba(124,106,247,0.15);
      color: var(--accent);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      border: 1px solid rgba(124,106,247,0.25);
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 12px;
    }
    .header h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 440px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Input box ───────────────────────────────────────── */
    .input-wrap {
      max-width: 640px;
      margin: 0 auto 56px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 28px 24px;
    }
    .input-wrap label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .input-row {
      display: flex;
      gap: 10px;
    }
    .input-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: var(--accent); }
    .input-row input::placeholder { color: var(--muted); }
    .btn-generate {
      background: linear-gradient(135deg, var(--accent), #9a88ff);
      color: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-generate:hover { opacity: 0.88; }
    .btn-generate:active { transform: scale(0.97); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Loading ─────────────────────────────────────────── */
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 48px 0;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: var(--muted); font-size: 0.9rem; }

    /* ── Error ───────────────────────────────────────────── */
    #error-box {
      display: none;
      max-width: 640px;
      margin: 0 auto 32px;
      background: rgba(247,119,106,0.1);
      border: 1px solid rgba(247,119,106,0.25);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--accent2);
      font-size: 0.88rem;
    }

    /* ── Brief container ─────────────────────────────────── */
    #brief {
      display: none;
      max-width: 900px;
      margin: 0 auto;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Hero del brief ──────────────────────────────────── */
    .brief-hero {
      background: linear-gradient(135deg, #1a1030, #0f1a30);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 40px 36px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .brief-hero::before {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(124,106,247,0.18), transparent 70%);
      top: -80px; right: -60px;
      border-radius: 50%;
    }
    .brief-hero::after {
      content: '';
      position: absolute;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(94,218,184,0.12), transparent 70%);
      bottom: -50px; left: -30px;
      border-radius: 50%;
    }
    .brand-name {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .brand-tagline {
      font-size: 1.1rem;
      color: var(--accent3);
      font-style: italic;
      margin-bottom: 20px;
    }
    .brand-desc { color: rgba(255,255,255,0.65); font-size: 0.95rem; line-height: 1.7; max-width: 600px; }
    .brand-url-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── Grid de secciones ───────────────────────────────── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 640px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .brief-hero { padding: 28px 24px; }
    }

    /* ── Tarjeta genérica ────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .card.full { margin-bottom: 16px; }
    .card-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-label .icon { font-size: 0.9rem; }
    .card h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .card p {
      color: rgba(255,255,255,0.65);
      font-size: 0.88rem;
      line-height: 1.7;
    }

    /* ── Tags / chips ────────────────────────────────────── */
    .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.75);
    }
    .tag.accent { background: rgba(124,106,247,0.12); border-color: rgba(124,106,247,0.25); color: #b8aeff; }
    .tag.green  { background: rgba(94,218,184,0.1);  border-color: rgba(94,218,184,0.25);  color: var(--accent3); }

    /* ── Paleta de colores ───────────────────────────────── */
    .color-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
    @media (max-width: 480px) { .color-grid { grid-template-columns: repeat(2,1fr); } }
    .color-swatch {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .swatch-box { height: 80px; }
    .swatch-info { padding: 10px 12px; background: var(--surface2); }
    .swatch-name { font-size: 0.75rem; font-weight: 600; margin-bottom: 3px; }
    .swatch-hex  { font-size: 0.7rem; color: var(--muted); font-family: monospace; }
    .swatch-use  { font-size: 0.68rem; color: var(--muted); margin-top: 3px; line-height: 1.3; }

    /* ── Tipografía ──────────────────────────────────────── */
    .typo-pair { display: flex; flex-direction: column; gap: 12px; }
    .typo-item {
      background: var(--surface2);
      border-radius: 10px;
      padding: 14px 16px;
      border-left: 3px solid var(--accent);
    }
    .typo-item.secondary { border-left-color: var(--accent3); }
    .typo-item .typo-role { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .typo-item .typo-name { font-size: 1rem; font-weight: 700; }

    /* ── Diferenciadores ─────────────────────────────────── */
    .diff-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .diff-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: rgba(255,255,255,0.7);
      font-size: 0.88rem;
      line-height: 1.5;
    }
    .diff-list li::before {
      content: '◆';
      color: var(--accent);
      font-size: 0.55rem;
      margin-top: 5px;
      flex-shrink: 0;
    }

    /* ── Recomendaciones ─────────────────────────────────── */
    .reco-list { list-style: none; display: flex; flex-direction: column; gap: 12px; counter-reset: reco; }
    .reco-list li {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      color: rgba(255,255,255,0.7);
      font-size: 0.88rem;
      line-height: 1.6;
    }
    .reco-num {
      min-width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700;
      flex-shrink: 0;
    }

    /* ── Export button ───────────────────────────────────── */
    .export-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 32px;
    }
    .btn-export {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 500;
      padding: 10px 22px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-export:hover { background: var(--surface2); }
    .btn-export.primary {
      background: linear-gradient(135deg, var(--accent), #9a88ff);
      border-color: transparent;
    }
    .btn-export.primary:hover { opacity: 0.88; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="badge">Herramienta de Branding</div>
    <h1>Genera tu<br><span>Identidad de Marca</span></h1>
    <p>Ingresa la URL de cualquier sitio web y obtén un brief completo de branding en segundos.</p>
  </div>

  <!-- INPUT -->
  <div class="input-wrap">
    <label>URL del sitio web</label>
    <div class="input-row">
      <input type="url" id="urlInput" placeholder="https://tuempresa.com" value="https://esp.vidroop.com" />
      <button class="btn-generate" id="btnGenerate" onclick="generateBrief()">Generar Brief</button>
    </div>
  </div>

  <!-- ERROR -->
  <div id="error-box"></div>

  <!-- LOADING -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Analizando el sitio y generando identidad de marca...</p>
  </div>

  <!-- BRIEF RESULT -->
  <div id="brief"></div>

  <script>
    const API = window.location.hostname === 'localhost' ? 'http://localhost:3001' : ''

    async function generateBrief() {
      const url = document.getElementById('urlInput').value.trim()
      if (!url) return showError('Por favor ingresa una URL válida.')

      setLoading(true)
      hideError()
      document.getElementById('brief').style.display = 'none'

      try {
        const res = await fetch(`${API}/api/branding`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        })
        const data = await res.json()
        if (!res.ok || !data.ok) throw new Error(data.error || 'Error del servidor')
        renderBrief(data.brief, data.url || url)
      } catch (err) {
        showError('Error: ' + err.message + '. Asegúrate de que el servidor esté corriendo (npm run api).')
      } finally {
        setLoading(false)
      }
    }

    function renderBrief(b, sourceUrl) {
      const el = document.getElementById('brief')
      el.style.display = 'block'

      // Determina texto de contraste para swatches
      function textColor(hex) {
        const r = parseInt(hex.slice(1,3),16)
        const g = parseInt(hex.slice(3,5),16)
        const bb = parseInt(hex.slice(5,7),16)
        return (r*0.299 + g*0.587 + bb*0.114) > 128 ? '#111' : '#fff'
      }

      const colores = (b.paleta_colores || []).map(c => `
        <div class="color-swatch">
          <div class="swatch-box" style="background:${c.hex}"></div>
          <div class="swatch-info">
            <div class="swatch-name">${c.nombre}</div>
            <div class="swatch-hex">${c.hex}</div>
            <div class="swatch-use">${c.uso}</div>
          </div>
        </div>`).join('')

      const valores = (b.valores || []).map(v => `<span class="tag accent">${v}</span>`).join('')
      const personalidad = (b.personalidad || []).map(p => `<span class="tag">${p}</span>`).join('')
      const palabras = (b.palabras_clave || []).map(p => `<span class="tag green">${p}</span>`).join('')
      const diffs = (b.diferenciadores || []).map(d => `<li>${d}</li>`).join('')
      const recos = (b.recomendaciones || []).map((r,i) => `
        <li><div class="reco-num">${i+1}</div><span>${r}</span></li>`).join('')

      el.innerHTML = `
        <!-- HERO -->
        <div class="brief-hero">
          <div class="brand-name">${b.nombre || '—'}</div>
          <div class="brand-tagline">"${b.tagline || ''}"</div>
          <div class="brand-desc">${b.descripcion || ''}</div>
          <div class="brand-url-tag">🔗 ${sourceUrl}</div>
        </div>

        <!-- MISIÓN + VISIÓN -->
        <div class="grid-2">
          <div class="card">
            <div class="card-label"><span class="icon">🎯</span> Misión</div>
            <p>${b.mision || '—'}</p>
          </div>
          <div class="card">
            <div class="card-label"><span class="icon">🔭</span> Visión</div>
            <p>${b.vision || '—'}</p>
          </div>
        </div>

        <!-- VALORES -->
        <div class="card full">
          <div class="card-label"><span class="icon">💎</span> Valores de Marca</div>
          <div class="tags">${valores}</div>
        </div>

        <!-- PROPUESTA + PÚBLICO -->
        <div class="grid-2">
          <div class="card">
            <div class="card-label"><span class="icon">⚡</span> Propuesta de Valor</div>
            <p>${b.propuesta_valor || '—'}</p>
          </div>
          <div class="card">
            <div class="card-label"><span class="icon">👥</span> Público Objetivo</div>
            <p>${b.publico_objetivo || '—'}</p>
          </div>
        </div>

        <!-- PERSONALIDAD + TONO -->
        <div class="grid-2">
          <div class="card">
            <div class="card-label"><span class="icon">🎭</span> Personalidad de Marca</div>
            <div class="tags">${personalidad}</div>
          </div>
          <div class="card">
            <div class="card-label"><span class="icon">💬</span> Tono de Voz</div>
            <p>${b.tono_de_voz || '—'}</p>
          </div>
        </div>

        <!-- PALETA DE COLORES -->
        <div class="card full">
          <div class="card-label"><span class="icon">🎨</span> Paleta de Colores</div>
          <div class="color-grid">${colores}</div>
        </div>

        <!-- TIPOGRAFÍA + PALABRAS CLAVE -->
        <div class="grid-2">
          <div class="card">
            <div class="card-label"><span class="icon">✍️</span> Tipografía</div>
            <div class="typo-pair">
              <div class="typo-item">
                <div class="typo-role">Titulares</div>
                <div class="typo-name">${b.tipografia?.principal || '—'}</div>
              </div>
              <div class="typo-item secondary">
                <div class="typo-role">Cuerpo de texto</div>
                <div class="typo-name">${b.tipografia?.secundaria || '—'}</div>
              </div>
            </div>
            <p style="margin-top:12px;font-size:0.82rem;">${b.tipografia?.estilo || ''}</p>
          </div>
          <div class="card">
            <div class="card-label"><span class="icon">🔑</span> Palabras Clave SEO</div>
            <div class="tags">${palabras}</div>
          </div>
        </div>

        <!-- ESTILO VISUAL -->
        <div class="card full">
          <div class="card-label"><span class="icon">🖼️</span> Estilo Visual</div>
          <p>${b.estilo_visual || '—'}</p>
        </div>

        <!-- DIFERENCIADORES -->
        <div class="card full">
          <div class="card-label"><span class="icon">🏆</span> Diferenciadores Clave</div>
          <ul class="diff-list">${diffs}</ul>
        </div>

        <!-- RECOMENDACIONES -->
        <div class="card full">
          <div class="card-label"><span class="icon">💡</span> Recomendaciones Estratégicas</div>
          <ul class="reco-list">${recos}</ul>
        </div>

        <!-- EXPORT -->
        <div class="export-row">
          <button class="btn-export" onclick="copyJSON()">Copiar JSON</button>
          <button class="btn-export primary" onclick="printBrief()">Exportar / Imprimir</button>
        </div>
      `

      // Guarda brief para export
      window._lastBrief = b
      el.scrollIntoView({ behavior: 'smooth', block: 'start' })
    }

    function copyJSON() {
      if (!window._lastBrief) return
      navigator.clipboard.writeText(JSON.stringify(window._lastBrief, null, 2))
        .then(() => alert('JSON copiado al portapapeles'))
    }

    function printBrief() { window.print() }

    function setLoading(on) {
      document.getElementById('loading').style.display = on ? 'flex' : 'none'
      document.getElementById('btnGenerate').disabled = on
    }

    function showError(msg) {
      const el = document.getElementById('error-box')
      el.textContent = msg
      el.style.display = 'block'
    }

    function hideError() {
      document.getElementById('error-box').style.display = 'none'
    }

    // Enter en input
    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') generateBrief()
    })
  </script>
</body>
</html>
